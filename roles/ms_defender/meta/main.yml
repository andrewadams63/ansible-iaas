---
galaxy_info:
  role_name: ms_defender
  author: platform-team
  description: >
    Install Microsoft Defender for Endpoint (MDE) on Linux and Windows.
    Linux uses the mdatp package; Windows uses the built-in Defender or MDE MSI.
  min_ansible_version: "2.15"
  platforms:
    - name: EL
      versions: [8, 9]
    - name: Ubuntu
      versions: [20, 22, 24]
    - name: Windows
      versions: [all]

dependencies: []
