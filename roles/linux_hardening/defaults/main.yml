---
# SSH configuration
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_challenge_response_authentication: "no"
ssh_x11_forwarding: "no"
ssh_max_auth_tries: 4
ssh_login_grace_time: 60
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2
ssh_allowed_users: "ansible"
ssh_banner: /etc/issue.net

# Firewall — list of allowed TCP ports (firewalld zones used on EL)
firewall_allowed_tcp_ports:
  - "22"

# Auditd
auditd_max_log_file: 8
auditd_num_logs: 5
auditd_log_max_file_action: rotate
auditd_space_left_action: email
auditd_admin_space_left_action: halt
auditd_disk_full_action: halt

# Password policy (PAM/pwquality)
password_min_length: 14
password_min_class: 4
password_max_repeat: 3
password_remember: 5
password_max_days: 90
password_min_days: 1
password_warn_days: 14

# Services to disable
services_to_disable:
  - avahi-daemon
  - cups
  - rpcbind
  - nfs
  - bluetooth

# umask
common_umask: "027"
