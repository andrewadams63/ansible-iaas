---
- name: Install pwquality (EL)
  ansible.builtin.dnf:
    name: libpwquality
    state: present
  when: ansible_os_family == "RedHat"

- name: Install libpam-pwquality (Debian/Ubuntu)
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
  when: ansible_os_family == "Debian"

- name: Configure pwquality
  ansible.builtin.template:
    src: pwquality.conf.j2
    dest: /etc/security/pwquality.conf
    owner: root
    group: root
    mode: "0644"

- name: Set password aging policy for existing users
  ansible.builtin.command:
    cmd: >
      chage --maxdays {{ password_max_days }}
            --mindays {{ password_min_days }}
            --warndays {{ password_warn_days }}
            {{ item }}
  loop: "{{ ansible_users | default([]) }}"
  changed_when: false   # chage doesn't exit non-zero when already set
