---
- name: Configure sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Write SSH login banner
  ansible.builtin.copy:
    dest: /etc/issue.net
    content: |
      ########################################################################
      # This system is for authorized use only.                              #
      # All activity is monitored and logged.  Unauthorized access is        #
      # subject to criminal and civil penalties.                             #
      ########################################################################
    owner: root
    group: root
    mode: "0644"

- name: Regenerate SSH host keys if missing
  ansible.builtin.command:
    cmd: ssh-keygen -A
    creates: /etc/ssh/ssh_host_ed25519_key
