---
# provision.yml — GitHub Actions workflow
#
# Triggered after Terraform completes (via workflow_call from your TF repo)
# or manually for ad-hoc provisioning runs.
#
# Required GitHub Secrets (set in repo Settings → Secrets and variables → per environment):
#
#   Always required:
#     ANSIBLE_SSH_PRIVATE_KEY  — private key for the 'ansible' service account
#
#   When secrets_backend == ansible_vault (development default):
#     ANSIBLE_VAULT_PASSWORD   — decrypts the vault.yml files
#
#   When secrets_backend == hashicorp_vault (staging/production default):
#     VAULT_ADDR               — e.g. https://vault.internal.acme.com
#     VAULT_ROLE_ID            — AppRole role_id  (non-sensitive, can be a var)
#     VAULT_SECRET_ID          — AppRole secret_id (sensitive, must be a secret)

name: Provision New Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development | staging | production)"
        required: true
        type: string
      terraform_outputs:
        description: "JSON string of Terraform outputs (passed from TF workflow)"
        required: false
        type: string
        default: "{}"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: development
        type: choice
        options:
          - development
          - staging
          - production
      limit:
        description: "Ansible limit (hostname, group, or 'all')"
        required: false
        default: "all"
      check_mode:
        description: "Dry run (check mode)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  ANSIBLE_FORCE_COLOR: "1"
  ANSIBLE_HOST_KEY_CHECKING: "False"

jobs:
  lint:
    name: Lint playbooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint playbooks/provision.yml

  provision:
    name: Provision — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: lint
    environment: ${{ inputs.environment }}   # Uses GitHub environment for approval gates
    concurrency:
      group: ansible-${{ inputs.environment }}
      cancel-in-progress: false             # Never cancel an in-flight run

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ansible and dependencies
        run: |
          pip install ansible
          ansible-galaxy collection install -r collections/requirements.yml -p collections/

      # ansible_vault backend: write the vault password file
      - name: Write vault password file
        if: env.ANSIBLE_VAULT_PASSWORD != ''
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}

      - name: Write Terraform-derived inventory (if provided)
        if: inputs.terraform_outputs != '{}'
        run: |
          echo '${{ inputs.terraform_outputs }}' > /tmp/tf_outputs.json
          python3 scripts/tf_inventory.py /tmp/tf_outputs.json \
            > inventories/${{ inputs.environment }}/tf_hosts.yml

      - name: Run provision playbook
        env:
          # HashiCorp Vault — only used when secrets_backend=hashicorp_vault
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
          # Fallback token auth (dev/test Vault servers)
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          ARGS="playbooks/provision.yml \
            -i inventories/${{ inputs.environment }}/hosts.yml \
            --extra-vars env=${{ inputs.environment }}"

          if [ -f inventories/${{ inputs.environment }}/tf_hosts.yml ]; then
            ARGS="$ARGS -i inventories/${{ inputs.environment }}/tf_hosts.yml"
          fi

          if [ -n "${{ inputs.limit }}" ] && [ "${{ inputs.limit }}" != "all" ]; then
            ARGS="$ARGS -l ${{ inputs.limit }}"
          fi

          if [ "${{ inputs.check_mode }}" = "true" ]; then
            ARGS="$ARGS --check --diff"
          fi

          ansible-playbook $ARGS

      - name: Clean up vault password
        if: always()
        run: rm -f .vault_pass
