---
# Variables for ALL hosts in the development environment.
# These override role defaults but are overridden by host_vars.

# ── Secrets backend ────────────────────────────────────────────────────────
# 'ansible_vault' — secrets come from the encrypted vault.yml in this dir.
# 'hashicorp_vault' — secrets fetched at run-time by fetch_secrets.yml pre-task.
#
# Local testing default is ansible_vault.  Set to hashicorp_vault in CI or
# when you have a Vault server available.
# Override at runtime: --extra-vars secrets_backend=hashicorp_vault
secrets_backend: ansible_vault

# HCP Vault connection — only used when secrets_backend == 'hashicorp_vault'.
# vault_addr and vault_auth_method can also be set via environment variables
# (VAULT_ADDR, VAULT_AUTH_METHOD) which take precedence over these values.
hcv_addr: "https://vault.internal.acme.com"
hcv_auth_method: "approle"          # approle | token | aws_iam | ldap
hcv_secrets_mount: "secret"         # KV v2 mount point
hcv_secrets_path_prefix: "ansible/development"  # secrets live at <mount>/data/<prefix>/<name>
# hcv_namespace: "admin"            # Uncomment for HCP Vault or Vault Enterprise namespaces

# ── Environment metadata ───────────────────────────────────────────────────
env: development
org_name: "acme"
datacenter: "us-east-1"

# ── Datadog ────────────────────────────────────────────────────────────────
# Value populated by fetch_secrets.yml when secrets_backend == hashicorp_vault;
# falls back to vault.yml when secrets_backend == ansible_vault.
datadog_api_key: "{{ vault_datadog_api_key }}"
datadog_site: "datadoghq.com"
datadog_tags:
  - "env:development"
  - "team:platform"

# ── Tenable (Nessus) agent ─────────────────────────────────────────────────
tenable_linking_key: "{{ vault_tenable_linking_key }}"
tenable_manager_host: "cloud.tenable.com"
tenable_agent_group: "development"

# ── DNS ────────────────────────────────────────────────────────────────────
dns_servers:
  - "10.0.0.2"
  - "10.0.0.3"
dns_search_domains:
  - "dev.internal.acme.com"
  - "internal.acme.com"

# ── NTP ────────────────────────────────────────────────────────────────────
ntp_servers:
  - "time.cloudflare.com"
  - "time.google.com"

# ── SSH hardening ──────────────────────────────────────────────────────────
# Less restrictive in dev to ease debugging
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_max_auth_tries: 6
ssh_allowed_users: "ansible"
