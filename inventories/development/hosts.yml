---
# Development inventory
# This file is committed.  Add real hosts here or let the Terraform bridge
# script generate inventories/development/tf_hosts.yml (gitignored).
#
# Run a targeted play:  ansible-playbook playbooks/site.yml -l webservers
# Check connectivity:    ansible all -m ping

all:
  vars:
    env: development

  children:
    linux:
      children:
        webservers:
          hosts:
            dev-web-01:
              ansible_host: 10.0.1.10
        dbservers:
          hosts:
            dev-db-01:
              ansible_host: 10.0.1.20
        mgmt:
          hosts:
            dev-mgmt-01:
              ansible_host: 10.0.1.5

    windows:
      children:
        win_servers:
          hosts: {}
