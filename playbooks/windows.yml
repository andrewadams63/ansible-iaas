---
# windows.yml — All Windows hosts.

- name: Windows baseline configuration
  hosts: windows
  gather_facts: true
  any_errors_fatal: false

  pre_tasks:
    - name: Fetch secrets (ansible_vault or hashicorp_vault)
      ansible.builtin.include_tasks: pre_tasks/fetch_secrets.yml
      tags: [always]

  roles:
    - role: dns_config
      tags: [dns]

    - role: datadog
      tags: [datadog, monitoring]

    - role: tenable_agent
      tags: [tenable, security]

    - role: ms_defender
      tags: [mde, defender, security]
