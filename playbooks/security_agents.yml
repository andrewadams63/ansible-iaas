---
# security_agents.yml — Install/update Tenable and MDE only.
# Tag with --tags tenable or --tags mde to run a single agent.

- name: Deploy security agents
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Fetch secrets (ansible_vault or hashicorp_vault)
      ansible.builtin.include_tasks: pre_tasks/fetch_secrets.yml
      tags: [always]

  roles:
    - role: tenable_agent
      tags: [tenable]

    - role: ms_defender
      tags: [mde, defender]
