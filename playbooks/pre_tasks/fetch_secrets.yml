---
# fetch_secrets.yml — Conditionally populate secret variables from HashiCorp Vault.
#
# Include this at the top of every play's pre_tasks block:
#
#   pre_tasks:
#     - ansible.builtin.include_tasks: pre_tasks/fetch_secrets.yml
#       tags: [always]
#
# BACKENDS
# ────────
# secrets_backend: ansible_vault  (default in development)
#   → Secrets come from the ansible-vault encrypted vault.yml in group_vars.
#     No network calls are made to any Vault server.
#
# secrets_backend: hashicorp_vault  (default in staging/production)
#   → Secrets are fetched at run-time using the community.hashi_vault lookup.
#     The vault.yml variables (vault_*) are NOT used in this mode so the file
#     can contain placeholder values — or be absent entirely.
#
# AUTHENTICATION (hashicorp_vault mode)
# ──────────────────────────────────────
# auth_method: approle  (recommended for CI/CD)
#   Required env vars: VAULT_ROLE_ID, VAULT_SECRET_ID
#
# auth_method: token  (for quick local testing with a Vault dev server)
#   Required env var:  VAULT_TOKEN
#
# auth_method: aws_iam  (for EC2/ECS instances with an IAM role)
#   No extra vars needed — uses the instance metadata service.
#
# The VAULT_ADDR environment variable always overrides hcv_addr.
#
# VAULT PATH CONVENTION
# ──────────────────────
# Secrets are stored as KV v2 at:
#   <hcv_secrets_mount>/data/<hcv_secrets_path_prefix>/<secret_name>
#
# Example (production):
#   secret/data/ansible/production/datadog    → { api_key: "..." }
#   secret/data/ansible/production/tenable   → { linking_key: "..." }
#
# Bootstrap your Vault with:
#   vault kv put secret/ansible/production/datadog   api_key="..."
#   vault kv put secret/ansible/production/tenable   linking_key="..."

- name: "[secrets] Skip HashiCorp Vault fetch (ansible_vault backend)"
  ansible.builtin.debug:
    msg: >
      secrets_backend=ansible_vault — using ansible-vault encrypted vars.
      Set secrets_backend=hashicorp_vault to switch to HashiCorp Vault.
  when: secrets_backend != 'hashicorp_vault'
  tags: [always]

- name: "[secrets] Fetch secrets from HashiCorp Vault"
  when: secrets_backend == 'hashicorp_vault'
  tags: [always]
  block:
    - name: "[secrets] Resolve Vault address (env var takes precedence)"
      ansible.builtin.set_fact:
        _hcv_addr: "{{ lookup('ansible.builtin.env', 'VAULT_ADDR') | default(hcv_addr, true) }}"
        _hcv_auth_method: "{{ lookup('ansible.builtin.env', 'VAULT_AUTH_METHOD') | default(hcv_auth_method, true) }}"

    - name: "[secrets] Build common lookup kwargs"
      ansible.builtin.set_fact:
        _hcv_kwargs:
          url: "{{ _hcv_addr }}"
          auth_method: "{{ _hcv_auth_method }}"
          token: "{{ lookup('ansible.builtin.env', 'VAULT_TOKEN') | default(omit) }}"
          role_id: "{{ lookup('ansible.builtin.env', 'VAULT_ROLE_ID') | default(omit) }}"
          secret_id: "{{ lookup('ansible.builtin.env', 'VAULT_SECRET_ID') | default(omit) }}"
          engine_mount_point: "{{ hcv_secrets_mount }}"

    # ── Fetch each secret group ─────────────────────────────────────────────
    # Each task reads one KV v2 path and registers the result as a fact.
    # Add a task here for every new secret you add to Vault.

    - name: "[secrets] Fetch Datadog secrets"
      ansible.builtin.set_fact:
        datadog_api_key: >-
          {{ lookup(
               'community.hashi_vault.hashi_vault',
               hcv_secrets_mount + '/data/' + hcv_secrets_path_prefix + '/datadog',
               **_hcv_kwargs
             ).data.data.api_key }}
      no_log: true

    - name: "[secrets] Fetch Tenable secrets"
      ansible.builtin.set_fact:
        tenable_linking_key: >-
          {{ lookup(
               'community.hashi_vault.hashi_vault',
               hcv_secrets_mount + '/data/' + hcv_secrets_path_prefix + '/tenable',
               **_hcv_kwargs
             ).data.data.linking_key }}
      no_log: true

    - name: "[secrets] Fetch Windows credential secrets (if Windows host)"
      ansible.builtin.set_fact:
        vault_win_ansible_user: >-
          {{ lookup(
               'community.hashi_vault.hashi_vault',
               hcv_secrets_mount + '/data/' + hcv_secrets_path_prefix + '/windows_ansible',
               **_hcv_kwargs
             ).data.data.username }}
        vault_win_ansible_password: >-
          {{ lookup(
               'community.hashi_vault.hashi_vault',
               hcv_secrets_mount + '/data/' + hcv_secrets_path_prefix + '/windows_ansible',
               **_hcv_kwargs
             ).data.data.password }}
      no_log: true
      when: ansible_os_family == 'Windows'

    - name: "[secrets] Confirm HashiCorp Vault secrets loaded"
      ansible.builtin.debug:
        msg: "Secrets loaded from HashiCorp Vault at {{ _hcv_addr }} (path prefix: {{ hcv_secrets_path_prefix }})"
