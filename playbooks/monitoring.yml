---
# monitoring.yml — Install/update Datadog agent only.
# Useful for rolling out agent config changes without a full site run.

- name: Deploy Datadog agent
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Fetch secrets (ansible_vault or hashicorp_vault)
      ansible.builtin.include_tasks: pre_tasks/fetch_secrets.yml
      tags: [always]

  roles:
    - role: datadog
      tags: [datadog]
