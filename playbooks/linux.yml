---
# linux.yml — All Linux hosts.
# Applied in order: secrets → common → dns → hardening → monitoring → security agents.

- name: Linux baseline and hardening
  hosts: linux
  gather_facts: true
  any_errors_fatal: false

  pre_tasks:
    - name: Fetch secrets (ansible_vault or hashicorp_vault)
      ansible.builtin.include_tasks: pre_tasks/fetch_secrets.yml
      tags: [always]

  roles:
    - role: common
      tags: [common]

    - role: dns_config
      tags: [dns]

    - role: linux_hardening
      tags: [hardening]

    - role: datadog
      tags: [datadog, monitoring]

    - role: tenable_agent
      tags: [tenable, security]

    - role: ms_defender
      tags: [mde, defender, security]
