---
# linux.yml — All Linux hosts.
# Applied in order: common → dns → hardening → monitoring → security agents.

- name: Linux baseline and hardening
  hosts: linux
  gather_facts: true
  any_errors_fatal: false

  roles:
    - role: common
      tags: [common]

    - role: dns_config
      tags: [dns]

    - role: linux_hardening
      tags: [hardening]

    - role: datadog
      tags: [datadog, monitoring]

    - role: tenable_agent
      tags: [tenable, security]

    - role: ms_defender
      tags: [mde, defender, security]
