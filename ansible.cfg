[defaults]
# Default to development inventory — operators must explicitly target staging/production
inventory          = inventories/development/hosts.yml
roles_path         = roles
collections_path   = collections
forks              = 10
timeout            = 30
remote_user        = ansible
private_key_file   = ~/.ssh/ansible_ed25519

# Human-readable output
stdout_callback    = yaml
bin_ansible_callbacks = True

# Always show diffs when --check is used
diff_always        = False

# Retry files are noisy; disable them
retry_files_enabled = False

# Vault password file — excluded from git, created by operator or CI
# Can be overridden with: ANSIBLE_VAULT_PASSWORD_FILE env var
vault_password_file = .vault_pass

# Gather facts only when needed (roles/playbooks can override)
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout   = 3600

[inventory]
# Warn when an inventory source is empty
unparsed_is_failed = True

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_ask_pass = False

[ssh_connection]
# Reduce SSH overhead
ssh_args          = -C -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
pipelining        = True
control_path_dir  = /tmp/ansible-ssh-%%h-%%p-%%r

[persistent_connection]
connect_timeout  = 30
command_timeout  = 30
